<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SDSY — Weekend Tournaments Jun 27–29</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap');
  :root{--navy:#071628;--navy2:#0d2240;--navy3:#152e52;--gold:#c8a84b;--green:#3dd68c;--text:#dde4ef;--muted:#7a90b0;--border:#1e3558;--sat:#3dd68c;--sun:#60a5fa;--mon:#c084fc;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--navy);color:var(--text);font-family:'Barlow',sans-serif;min-height:100vh;}
  header{background:linear-gradient(160deg,#0d2a50 0%,#071628 60%);border-bottom:2px solid var(--gold);padding:24px 20px 20px;position:sticky;top:0;z-index:100;}
  .header-inner{max-width:820px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;}
  .header-label{font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:4px;color:var(--gold);text-transform:uppercase;margin-bottom:5px;}
  header h1{font-family:'Barlow Condensed',sans-serif;font-size:clamp(22px,5vw,30px);font-weight:800;color:#fff;line-height:1.1;margin-bottom:4px;}
  header p{font-size:13px;color:var(--muted);}
  .header-logo{height:52px;width:auto;opacity:0.85;flex-shrink:0;margin-left:16px;}
  .controls{background:var(--navy2);border-bottom:1px solid var(--border);padding:12px 20px;position:sticky;top:93px;z-index:99;}
  .controls-inner{max-width:820px;margin:0 auto;display:flex;flex-wrap:wrap;gap:8px;align-items:center;}
  .btn-group{display:flex;gap:4px;flex-wrap:wrap;}
  .btn{padding:5px 12px;font-size:12px;font-family:'Barlow Condensed',sans-serif;font-weight:600;letter-spacing:1px;text-transform:uppercase;border:1px solid var(--border);border-radius:4px;background:transparent;color:var(--muted);cursor:pointer;transition:all .15s;}
  .btn:hover{border-color:var(--gold);color:var(--gold);}
  .btn.active{background:var(--gold);color:var(--navy);border-color:var(--gold);}
  .btn.active-navy{background:var(--navy3);color:var(--gold);border-color:var(--gold);}
  .btn.map-btn{border-color:#60a5fa44;color:#60a5fa;}
  .btn.map-btn:hover,.btn.map-btn.active{background:#60a5fa;color:var(--navy);border-color:#60a5fa;}
  .divider{width:1px;height:24px;background:var(--border);margin:0 4px;}
  .count{margin-left:auto;font-size:12px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;}
  .content{max-width:820px;margin:0 auto;padding:20px;}
  .field-map-wrap{display:none;margin-bottom:24px;border-radius:10px;overflow:hidden;border:1px solid var(--border);}
  .field-map-wrap.open{display:block;}
  .field-map-wrap img{width:100%;display:block;}
  .field-map-label{font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;padding:8px 12px;background:var(--navy2);text-align:center;}
  .tourn-section{margin-bottom:32px;}
  .tourn-label{font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:3px;color:var(--gold);text-transform:uppercase;margin-bottom:3px;}
  .tourn-venue{font-size:11px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);}
  .team-card{margin-bottom:8px;border-radius:8px;overflow:hidden;}
  .team-header{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:var(--navy2);border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:border-color .15s,background .15s;}
  .team-header:hover{border-color:var(--gold);}
  .team-header.open{border-color:var(--gold);background:var(--navy3);border-radius:8px 8px 0 0;}
  .team-name{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;}
  .team-sub{font-size:11px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;margin-top:2px;}
  .chevron{color:var(--gold);font-size:14px;transition:transform .2s;}
  .chevron.open{transform:rotate(180deg);}
  .team-body{display:none;background:#050d1a;border:1px solid var(--gold);border-top:none;border-radius:0 0 8px 8px;}
  .team-body.open{display:block;}
  .game-row{display:grid;grid-template-columns:42px 80px 110px 1fr;gap:8px;padding:9px 16px;align-items:center;border-bottom:1px solid #0c1a2e;font-size:13px;}
  .game-row:last-of-type{border-bottom:none;}
  .game-row.bracket{opacity:0.65;}
  .day-badge{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;}
  .day-sat{color:var(--sat);} .day-sun{color:var(--sun);} .day-mon{color:var(--mon);}
  .game-time{font-family:'Barlow Condensed',sans-serif;font-size:13px;color:var(--gold);font-weight:600;}
  .game-field{font-size:11px;color:#b8cce4;font-family:'Barlow Condensed',sans-serif;}
  .game-matchup{display:flex;flex-direction:column;gap:1px;min-width:0;}
  .team-home{font-size:12px;font-weight:500;}
  .team-away{font-size:11px;color:var(--muted);}
  .sdsy-team{color:var(--green);}
  .bracket-label{font-size:10px;color:var(--mon);font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;margin-top:2px;}
  .day-section{margin-bottom:28px;}
  .day-header{font-family:'Barlow Condensed',sans-serif;font-size:13px;letter-spacing:3px;font-weight:700;margin-bottom:12px;padding-bottom:8px;text-transform:uppercase;}
  .day-header.day-sat{color:var(--sat);border-bottom:1px solid #3dd68c33;}
  .day-header.day-sun{color:var(--sun);border-bottom:1px solid #60a5fa33;}
  .day-header.day-mon{color:var(--mon);border-bottom:1px solid #c084fc33;}
  .sched-row{display:grid;grid-template-columns:100px 1fr 44px;gap:8px;padding:10px 14px;align-items:center;background:var(--navy2);border:1px solid var(--border);border-radius:6px;margin-bottom:6px;font-size:13px;border-left-width:3px;}
  .sched-row.sat{border-left-color:var(--sat);} .sched-row.sun{border-left-color:var(--sun);} .sched-row.mon{border-left-color:var(--mon);}
  .sched-row.bracket{opacity:0.65;}
  .sched-time{font-family:'Barlow Condensed',sans-serif;font-weight:700;color:var(--gold);font-size:13px;}
  .sched-field{font-family:'Barlow Condensed',sans-serif;font-size:10px;color:#8aaac8;margin-top:2px;}
  .sched-team-name{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;color:var(--gold);}
  .sched-matchup{font-size:11px;color:var(--muted);margin-top:2px;}
  .sched-age{font-size:10px;font-family:'Barlow Condensed',sans-serif;color:var(--muted);letter-spacing:1px;text-align:right;}
  @media(max-width:520px){
    .game-row{grid-template-columns:36px 72px 1fr;gap:6px;}
    .game-field{display:none;}
    .sched-row{grid-template-columns:72px 1fr 36px;}
    header{padding:16px 16px 14px;}
    .controls{padding:10px 16px;top:80px;}
    .content{padding:16px;}
  }
</style>
</head>

  {id:"gu11-black-camperell",name:"GU11 Black – Camperell",div:"GU11",age:"U11",gender:"Girls",tournament:"shelton",venue:"Ryan Park, San Diego",games:[
    {day:"Sat",time:"9:15 AM",field:"Field #7",home:"Cardiff Sockers SDSY GU11 Black Camperell",away:"PYSL Blast SC GU11 Beal"},
    {day:"Sat",time:"1:40 PM",field:"Field #6",home:"Fury FC (S-CA) GU11",away:"Cardiff Sockers SDSY GU11 Black Camperell"},
    {day:"Sun",time:"11:05 AM",field:"Field #4",home:"Scripps Ranch SC GU11 Red",away:"Cardiff Sockers SDSY GU11 Black Camperell"},
    {day:"Sun",time:"3:00 PM",field:"Field #6",home:"Bracket A #1",away:"Bracket A #2",bracket:true,label:"Final"},
  ]},
  {id:"gu12-black-camperell",name:"GU12 Black – Camperell",div:"GU12",age:"U12",gender:"Girls",tournament:"shelton",venue:"Ryan Park, San Diego",games:[
    {day:"Sat",time:"7:50 AM",field:"Field #4",home:"Cardiff Sockers SDSY GU12 Black Camperell",away:"Golden Eagles FC GU12"},
    {day:"Sat",time:"11:20 AM",field:"Field #6",home:"SDSC Surf Escondido GU12 BLUE-ESC",away:"Cardiff Sockers SDSY GU12 Black Camperell"},
    {day:"Sun",time:"8:55 AM",field:"Field #7",home:"SDSC Surf GU12 Gold",away:"Cardiff Sockers SDSY GU12 Black Camperell"},
    {day:"Sun",time:"4:30 PM",field:"Field #6",home:"Cardiff Sockers SDSY GU12 Black Camperell",away:"City SC Chula Vista GU12 Taylor"},
  ]},
];

let currentView='day',currentTourn='All',currentAge='All',mapOpen=false;
function isSDSY(n){return n&&(n.startsWith('Cardiff Sockers')||n.startsWith('SDSY')||n.startsWith('San Diego Sockers'));}
function dayClass(d){return d==='Sat'?'day-sat':d==='Sun'?'day-sun':'day-mon';}
function setView(v){currentView=v;document.getElementById('view-day').className=v==='day'?'btn active':'btn';document.getElementById('view-teams').className=v==='teams'?'btn active':'btn';render();}
function setTourn(t){currentTourn=t;document.querySelectorAll('[data-tourn]').forEach(b=>b.className=b.dataset.tourn===t?'btn active-navy':'btn');render();}
function setAge(a){currentAge=a;document.querySelectorAll('[data-age]').forEach(b=>b.className=b.dataset.age===a?'btn active-navy':'btn');render();}
function filtered(){return TEAMS.filter(t=>(currentTourn==='All'||t.tournament===currentTourn)&&(currentAge==='All'||t.age===currentAge));}
function toggleMap(){mapOpen=!mapOpen;document.getElementById('field-map-wrap').classList.toggle('open',mapOpen);document.getElementById('map-btn').classList.toggle('active',mapOpen);}
function toggleTeam(id){const body=document.getElementById('body-'+id),hdr=document.getElementById('hdr-'+id),chv=document.getElementById('chv-'+id),open=body.classList.contains('open');body.classList.toggle('open',!open);hdr.classList.toggle('open',!open);chv.classList.toggle('open',!open);}

function renderTeams(teams){
  if(!teams.length)return '<p style="color:var(--muted);padding:20px 0;font-size:13px;">No teams match this filter.</p>';
  const tourns=[...new Set(teams.map(t=>t.tournament))];
  let html='';
  tourns.forEach(tid=>{
    const tinfo=TOURNAMENTS[tid],tt=teams.filter(t=>t.tournament===tid);
    html+=`<div class="tourn-section"><div class="tourn-label">${tinfo.name}</div><div class="tourn-venue">${tinfo.venue} &nbsp;&middot;&nbsp; ${tt.length} team${tt.length!==1?'s':''}</div>`;
    tt.forEach(team=>{
      html+=`<div class="team-card"><div class="team-header" id="hdr-${team.id}" onclick="toggleTeam('${team.id}')"><div><div class="team-name">${team.name}</div><div class="team-sub">${team.div} &middot; ${team.games.length} games</div></div><span class="chevron" id="chv-${team.id}">&#9660;</span></div><div class="team-body" id="body-${team.id}">`;
      team.games.forEach(g=>{
        html+=`<div class="game-row${g.bracket?' bracket':''}"><span class="day-badge ${dayClass(g.day)}">${g.day}</span><span class="game-time">${g.time}</span><div class="game-field">${g.field}<br><span style="font-size:10px;color:#8aaac8;">${team.venue}</span></div><div class="game-matchup"><div class="team-home${isSDSY(g.home)?' sdsy-team':''}">${g.home}</div><div class="team-away${isSDSY(g.away)?' sdsy-team':''}">vs ${g.away}</div>${g.label?`<div class="bracket-label">${g.label}</div>`:''} </div></div>`;
      });
      html+=`</div></div>`;
    });
    html+='</div>';
  });
  return html;
}

function renderDay(teams){
  const allGames=teams.flatMap(t=>t.games.map(g=>({...g,teamName:t.name,age:t.age,venue:t.venue})));
  if(!allGames.length)return '<p style="color:var(--muted);padding:20px 0;font-size:13px;">No games match this filter.</p>';
  const byDay={Sat:[],Sun:[],Mon:[]};
  allGames.forEach(g=>byDay[g.day]&&byDay[g.day].push(g));
  function parseTime(t){const[hm,ap]=t.split(' ');let[h,m]=hm.split(':').map(Number);if(ap==='PM'&&h!==12)h+=12;if(ap==='AM'&&h===12)h=0;return h*60+m;}
  let html='';
  [['Sat','Saturday, June 27'],['Sun','Sunday, June 28'],['Mon','Monday, June 29']].forEach(([day,label])=>{
    const games=byDay[day].sort((a,b)=>parseTime(a.time)-parseTime(b.time));
    if(!games.length)return;
    html+=`<div class="day-section"><div class="day-header ${dayClass(day)}">${label} &mdash; ${games.length} game${games.length!==1?'s':''}</div>`;
    games.forEach(g=>{
      html+=`<div class="sched-row ${day.toLowerCase()}${g.bracket?' bracket':''}"><div><div class="sched-time">${g.time}</div><div class="sched-field">${g.field} &middot; ${g.venue}</div></div><div><div class="sched-team-name">${g.teamName}${g.label?` <span style="font-size:10px;color:var(--mon);letter-spacing:1px;">&nbsp;${g.label}</span>`:''}</div><div class="sched-matchup"><span class="${isSDSY(g.home)?'sdsy-team':''}">${g.home}</span><span style="color:var(--muted)"> vs </span><span class="${isSDSY(g.away)?'sdsy-team':''}">${g.away}</span></div></div><div class="sched-age">${g.age}</div></div>`;
    });
    html+='</div>';
  });
  return html;
}

function render(){
  const teams=filtered();
  document.getElementById('count').textContent=teams.length+' team'+(teams.length!==1?'s':'');
  document.getElementById('app').innerHTML=currentView==='day'?renderDay(teams):renderTeams(teams);
}
render();
</script>
</body>
</html>
